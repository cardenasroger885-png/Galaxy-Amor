<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Galaxia de Amor 3D</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: radial-gradient(circle, #ff5f6d, #ffc371, #000);
    font-family: Arial;
    color: white;
}

#container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform-style: preserve-3d;
    transform: translate(-50%, -50%) rotateX(0deg) rotateY(0deg);
    animation: rotar 20s linear infinite;
}

.word {
    position: absolute;
    font-size: 18px;
    white-space: nowrap;
    color: #fff;
}

.center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: rgba(0,0,0,0.7);
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
}

@keyframes rotar {
    from {
        transform: translate(-50%, -50%) rotateX(0deg) rotateY(0deg);
    }
    to {
        transform: translate(-50%, -50%) rotateX(360deg) rotateY(360deg);
    }
}
</style>
</head>

<body>

<div id="container"></div>
<div class="center">💖 Mi Universo</div>

<script>
const palabras = [
    "Amor","Dulzura","Mi vida","Eternidad",
    "Pasión","Mi paz","Mi mundo","Ternura",
    "Destino","Universo","Mi calma","Mi cielo",
    "Mi reina","Mi rey","Te amo","Siempre tú"
];

const container = document.getElementById("container");
const total = 80;
const radio = 200;

// Crear palabras en forma de esfera
for (let i = 0; i < total; i++) {

    const word = document.createElement("div");
    word.className = "word";
    word.innerText = palabras[Math.floor(Math.random() * palabras.length)];

    // Coordenadas esféricas
    const phi = Math.acos(-1 + (2 * i) / total);
    const theta = Math.sqrt(total * Math.PI) * phi;

    const x = radio * Math.cos(theta) * Math.sin(phi);
    const y = radio * Math.sin(theta) * Math.sin(phi);
    const z = radio * Math.cos(phi);

    word.style.transform = `translate3d(${x}px, ${y}px, ${z}px)`;

    container.appendChild(word);
}
</script>

</body>
</html>
