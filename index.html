<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Galaxia 3D</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: radial-gradient(circle, #ff5f6d, #ffc371, #000);
    font-family: Arial;
    color: white;
}

/* ESTRELLAS */
.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    animation: parpadeo 2s infinite alternate;
}

@keyframes parpadeo {
    from { opacity: 0.2; }
    to { opacity: 1; }
}

/* METEORITOS */
.meteor {
    position: absolute;
    width: 3px;
    height: 3px;
    background: white;
    border-radius: 50%;
    box-shadow: 0 0 10px white;
    animation: caer 3s linear infinite;
}

@keyframes caer {
    from {
        transform: translate(0, 0);
        opacity: 1;
    }
    to {
        transform: translate(-300px, 300px);
        opacity: 0;
    }
}

#container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform-style: preserve-3d;
    transform: translate(-50%, -50%);
    animation: rotar 20s linear infinite;
}

.word {
    position: absolute;
    white-space: nowrap;
    font-size: 16px;
}

.center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #222;
    width: 120px;
    height: 120px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
}

@keyframes rotar {
    from {
        transform: translate(-50%, -50%) rotateX(0deg) rotateY(0deg);
    }
    to {
        transform: translate(-50%, -50%) rotateX(360deg) rotateY(360deg);
    }
}
</style>
</head>

<body>

<div id="container"></div>
<div class="center">💖 Mi Universo</div>

<script>
const palabras = [
"Amor","Dulzura","Mi vida","Eternidad",
"Pasión","Mi paz","Mi mundo","Ternura",
"Destino","Universo","Mi calma","Te amo"
];

const container = document.getElementById("container");
const total = 80;
const radio = 200;

/* ESFERA 3D */
for (let i = 0; i < total; i++) {

    const word = document.createElement("div");
    word.className = "word";
    word.innerText = palabras[Math.floor(Math.random() * palabras.length)];

    const phi = Math.acos(-1 + (2 * i) / total);
    const theta = Math.sqrt(total * Math.PI) * phi;

    const x = radio * Math.cos(theta) * Math.sin(phi);
    const y = radio * Math.sin(theta) * Math.sin(phi);
    const z = radio * Math.cos(phi);

    word.style.transform = `translate3d(${x}px, ${y}px, ${z}px)`;

    container.appendChild(word);
}

/* GENERAR ESTRELLAS */
for (let i = 0; i < 120; i++) {
    const star = document.createElement("div");
    star.className = "star";
    star.style.top = Math.random() * window.innerHeight + "px";
    star.style.left = Math.random() * window.innerWidth + "px";
    document.body.appendChild(star);
}

/* GENERAR METEORITOS */
function crearMeteorito() {
    const meteor = document.createElement("div");
    meteor.className = "meteor";

    meteor.style.top = Math.random() * 200 + "px";
    meteor.style.left = Math.random() * window.innerWidth + "px";

    document.body.appendChild(meteor);

    setTimeout(() => {
        meteor.remove();
    }, 3000);
}

/* LLUVIA DE METEORITOS */
setInterval(crearMeteorito, 800);

</script>

</body>
</html>
